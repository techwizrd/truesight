name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify lint and tests
        run: ./gradlew lintAll testDebugUnitTest :shared:test

  release_versioned:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: ./gradlew :app:assembleDebug

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
          overwrite_files: true

  release_unreleased:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
    concurrency:
      group: unreleased-release
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move unreleased tag to current commit
        run: git push origin :refs/tags/unreleased || true && git tag -f unreleased "${GITHUB_SHA}" && git push origin refs/tags/unreleased

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: ./gradlew :app:assembleDebug

      - name: Create or update unreleased prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: unreleased
          name: Unreleased
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
          overwrite_files: true
