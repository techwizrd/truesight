name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify lint and tests
        run: ./gradlew lintAll testDebugUnitTest :shared:test

  verify_ios:
    runs-on: macos-latest
    env:
      IOS_APP_SCHEME: TruesightIOS
      IOS_SHARE_EXTENSION_SCHEME: TruesightShareExtension
      IOS_DESTINATION: generic/platform=iOS Simulator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build iOS KMP frameworks
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 :shared:linkReleaseFrameworkIosSimulatorArm64

      - name: Run iOS simulator KMP tests
        run: ./gradlew :shared:iosSimulatorArm64Test

      - name: Locate iOS workspace or project
        id: locate_ios
        run: |
          set -euo pipefail
          if [ -d "iosApp/TruesightIOS.xcworkspace" ]; then
            echo "container_flag=-workspace" >> "$GITHUB_OUTPUT"
            echo "container_path=iosApp/TruesightIOS.xcworkspace" >> "$GITHUB_OUTPUT"
            echo "has_xcode_container=true" >> "$GITHUB_OUTPUT"
          elif [ -d "iosApp/TruesightIOS.xcodeproj" ]; then
            echo "container_flag=-project" >> "$GITHUB_OUTPUT"
            echo "container_path=iosApp/TruesightIOS.xcodeproj" >> "$GITHUB_OUTPUT"
            echo "has_xcode_container=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_xcode_container=false" >> "$GITHUB_OUTPUT"
            echo "No iOS Xcode project/workspace found. Skipping app/extension xcodebuild steps."
          fi

      - name: Resolve iOS schemes
        id: resolve_schemes
        if: steps.locate_ios.outputs.has_xcode_container == 'true'
        run: |
          set -euo pipefail
          xcodebuild \
            "${{ steps.locate_ios.outputs.container_flag }}" "${{ steps.locate_ios.outputs.container_path }}" \
            -list -json > ios_schemes.json

          python3 - <<'PY'
          import json
          import os
          import sys

          with open('ios_schemes.json', 'r', encoding='utf-8') as fh:
              payload = json.load(fh)

          container = payload.get('project') or payload.get('workspace') or {}
          schemes = container.get('schemes', [])
          if not schemes:
              print('No Xcode schemes found.', file=sys.stderr)
              sys.exit(1)

          requested_app = os.environ.get('IOS_APP_SCHEME', 'TruesightIOS')
          requested_ext = os.environ.get('IOS_SHARE_EXTENSION_SCHEME', 'TruesightShareExtension')

          def pick(preferred, fallback_predicate):
              if preferred in schemes:
                  return preferred
              for scheme in schemes:
                  if fallback_predicate(scheme):
                      return scheme
              return None

          app_scheme = pick(requested_app, lambda s: s.endswith('IOS') or s.endswith('iOS'))
          ext_scheme = pick(requested_ext, lambda s: 'ShareExtension' in s)

          if app_scheme is None:
              print(f'Unable to resolve app scheme. Requested: {requested_app}. Available: {schemes}', file=sys.stderr)
              sys.exit(1)
          if ext_scheme is None:
              print(f'Unable to resolve share extension scheme. Requested: {requested_ext}. Available: {schemes}', file=sys.stderr)
              sys.exit(1)

          output_path = os.environ['GITHUB_OUTPUT']
          with open(output_path, 'a', encoding='utf-8') as out:
              out.write(f'app_scheme={app_scheme}\n')
              out.write(f'extension_scheme={ext_scheme}\n')

          print(f'Using app scheme: {app_scheme}')
          print(f'Using extension scheme: {ext_scheme}')
          PY

      - name: Build iOS app target
        if: steps.locate_ios.outputs.has_xcode_container == 'true'
        run: |
          set -euo pipefail
          DESTINATIONS=(
            "$IOS_DESTINATION"
            "platform=iOS Simulator,name=iPhone 15"
          )

          for destination in "${DESTINATIONS[@]}"; do
            if xcodebuild \
              "${{ steps.locate_ios.outputs.container_flag }}" "${{ steps.locate_ios.outputs.container_path }}" \
              -scheme "${{ steps.resolve_schemes.outputs.app_scheme }}" \
              -configuration Debug \
              -destination "$destination" \
              CODE_SIGNING_ALLOWED=NO \
              build; then
              exit 0
            fi
          done

          exit 1

      - name: Build iOS share extension target
        if: steps.locate_ios.outputs.has_xcode_container == 'true'
        run: |
          set -euo pipefail
          DESTINATIONS=(
            "$IOS_DESTINATION"
            "platform=iOS Simulator,name=iPhone 15"
          )

          for destination in "${DESTINATIONS[@]}"; do
            if xcodebuild \
              "${{ steps.locate_ios.outputs.container_flag }}" "${{ steps.locate_ios.outputs.container_path }}" \
              -scheme "${{ steps.resolve_schemes.outputs.extension_scheme }}" \
              -configuration Debug \
              -destination "$destination" \
              CODE_SIGNING_ALLOWED=NO \
              build; then
              exit 0
            fi
          done

          exit 1

  release_versioned:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [verify, verify_ios]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: ./gradlew :app:assembleDebug :app:assembleRelease

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          DEBUG_APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          RELEASE_UNSIGNED_APK_PATH="app/build/outputs/apk/release/app-release-unsigned.apk"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${DEBUG_APK_PATH}" "${RELEASE_UNSIGNED_APK_PATH}" --clobber
          else
            gh release create "${TAG_NAME}" "${DEBUG_APK_PATH}" "${RELEASE_UNSIGNED_APK_PATH}" --generate-notes
          fi

  release_unreleased:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [verify, verify_ios]
    permissions:
      contents: write
    concurrency:
      group: unreleased-release
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move unreleased tag to current commit
        run: git tag -f unreleased "${GITHUB_SHA}" && git push --force origin refs/tags/unreleased

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: ./gradlew :app:assembleDebug :app:assembleRelease

      - name: Create or update unreleased prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DEBUG_APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          RELEASE_UNSIGNED_APK_PATH="app/build/outputs/apk/release/app-release-unsigned.apk"

          if gh release view unreleased >/dev/null 2>&1; then
            gh release edit unreleased --title "Unreleased" --prerelease --latest=false
            gh release upload unreleased "${DEBUG_APK_PATH}" "${RELEASE_UNSIGNED_APK_PATH}" --clobber
          else
            gh release create unreleased "${DEBUG_APK_PATH}" "${RELEASE_UNSIGNED_APK_PATH}" --title "Unreleased" --prerelease --latest=false --generate-notes
          fi
