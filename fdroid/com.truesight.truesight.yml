Summary: Privacy-focused link cleaner
Description: |
  Truesight cleans shared links before you copy, share, or open them.

  It unwraps redirect layers, strips common tracking query parameters,
  and keeps useful URL information intact.

  The app is powered by a Kotlin Multiplatform core used across Android and iOS.

